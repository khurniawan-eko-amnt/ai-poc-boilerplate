<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HE Inspection — Swimlane Flow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; padding: 40px; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; color: #f97316; }
  .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 32px; }
  .diagram-container { background: #0f172a; border: 1px solid #1e293b; border-radius: 16px; padding: 32px; overflow-x: auto; }
  svg { display: block; margin: 0 auto; }

  /* Legend */
  .legend { display: flex; gap: 24px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #94a3b8; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 4px; }

  .meta { text-align: center; color: #64748b; font-size: 12px; margin-top: 16px; }
</style>
</head>
<body>

<h1>HE Inspection — Process Swimlane Diagram</h1>
<p class="subtitle">Heavy Equipment Inspection During Refueling • CAT793 Haul Truck • 10-min Window</p>

<div class="diagram-container">
<svg viewBox="0 0 1200 2800" width="1200" height="2800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <!-- Arrow markers -->
    <marker id="arrow-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#34d399"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-rose" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#fb7185"/>
    </marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#fb923c"/>
    </marker>

    <!-- Background rect for semi-transparent fills -->
    <filter id="bg-layer" x="-2" y="-2" width="104%" height="104%">
      <feColorMatrix type="matrix" values="0 0 0 0 0.059 0 0 0 0 0.09 0 0 0 0 0.165 0 0 0 1 0"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="2800" fill="url(#grid)"/>

  <!-- ============================================================ -->
  <!-- LANES -->
  <!-- ============================================================ -->

  <!-- Lane separators -->
  <line x1="0" y1="80" x2="1200" y2="80" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="260" x2="1200" y2="260" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="780" x2="1200" y2="780" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="1440" x2="1200" y2="1440" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="2020" x2="1200" y2="2020" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="2500" x2="1200" y2="2500" stroke="#1e293b" stroke-width="1"/>

  <!-- Lane labels -->
  <rect x="20" y="100" width="160" height="48" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="100" y="130" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#22d3ee" font-weight="600">INSPECTOR</text>

  <rect x="20" y="290" width="160" height="48" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="100" y="320" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#34d399" font-weight="600">BROWSER / APP</text>

  <rect x="20" y="810" width="160" height="48" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="100" y="840" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fbbf24" font-weight="600">SUPABASE API</text>

  <rect x="20" y="1470" width="160" height="48" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="100" y="1500" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#a78bfa" font-weight="600">POSTGRES DB</text>

  <rect x="20" y="2050" width="160" height="48" rx="8" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="100" y="2080" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fb7185" font-weight="600">STORAGE</text>

  <rect x="20" y="2530" width="160" height="48" rx="8" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="100" y="2560" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fb923c" font-weight="600">LEGEND</text>

  <!-- Vertical lane guides -->
  <line x1="200" y1="80" x2="200" y2="2520" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- ============================================================ -->
  <!-- PHASE 1: Select & Start -->
  <!-- ============================================================ -->

  <!-- Phase label -->
  <rect x="220" y="86" width="960" height="28" rx="6" fill="#1e293b"/>
  <text x="240" y="105" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" font-weight="600">PHASE 1: SELECT &amp; START INSPECTION</text>

  <!-- 1. Search equipment -->
  <rect x="220" y="130" width="220" height="56" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="330" y="153" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">Search &amp; Select</text>
  <text x="330" y="171" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Equipment by fleet # / VIN</text>

  <!-- Arrow 1→2 -->
  <line x1="440" y1="158" x2="500" y2="158" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- 2. Click Start Inspection -->
  <rect x="500" y="130" width="220" height="56" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="610" y="153" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">Click</text>
  <text x="610" y="171" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">"Start Inspection"</text>

  <!-- Arrow 2→3 (cross-lane) -->
  <line x1="610" y1="186" x2="610" y2="310" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-cyan)"/>

  <!-- 3. App: Insert inspection_runs -->
  <rect x="420" y="300" width="280" height="56" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="560" y="323" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">INSERT inspection_runs</text>
  <text x="560" y="341" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">status: in_progress</text>

  <!-- Arrow 3→4 (cross-lane) -->
  <line x1="700" y1="328" x2="770" y2="328" stroke="#34d399" stroke-width="1.5"/>
  <line x1="770" y1="328" x2="770" y2="840" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-emerald)"/>

  <!-- 4. DB: Create run record -->
  <rect x="540" y="830" width="280" height="56" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="680" y="853" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">INSERT completed</text>
  <text x="680" y="871" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Run ID + status returned</text>

  <!-- Arrow DB→App (back) -->
  <path d="M820 858 L960 858 L960 328 L760 328" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-amber)"/>

  <!-- 5. Navigate to questions -->
  <rect x="420" y="472" width="280" height="56" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="560" y="495" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">Navigate to Questionnaire</text>
  <text x="560" y="513" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Load template + questions</text>

  <!-- Arrow 3→5 -->
  <line x1="560" y1="356" x2="560" y2="472" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- ============================================================ -->
  <!-- PHASE 2: Inspection Loop -->
  <!-- ============================================================ -->

  <rect x="220" y="560" width="960" height="28" rx="6" fill="#1e293b"/>
  <text x="240" y="579" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" font-weight="600">PHASE 2: INSPECTION LOOP — For each question, choose one of two paths</text>

  <!-- ─── DECISION: OK or Finding? ─── -->
  <polygon points="560,620 680,680 560,740 440,680" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="560" y="678" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">Defect</text>
  <text x="560" y="696" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Found?</text>

  <!-- ============================================================ -->
  <!-- PATH A: OK / No Finding -->
  <!-- ============================================================ -->

  <!-- Arrow: Decision → OK Path (left) -->
  <line x1="440" y1="680" x2="340" y2="680" stroke="#34d399" stroke-width="1.5"/>
  <text x="390" y="672" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">No</text>

  <!-- A1. Click OK -->
  <rect x="220" y="650" width="120" height="60" rx="10" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="280" y="673" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#22d3ee" font-weight="600">✓ OK</text>
  <text x="280" y="693" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">Click button</text>

  <!-- A1→A2 -->
  <line x1="280" y1="710" x2="280" y2="760" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- A2. Save answer (boolean=true) -->
  <rect x="220" y="760" width="120" height="50" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="280" y="783" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0" font-weight="600">saveAnswer()</text>
  <text x="280" y="799" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">boolean: true</text>

  <!-- A2→DB -->
  <line x1="340" y1="785" x2="540" y2="785" stroke="#34d399" stroke-width="1.5"/>
  <line x1="540" y1="785" x2="540" y2="850" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-emerald)"/>

  <!-- DB: INSERT answer -->
  <rect x="420" y="850" width="240" height="42" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="540" y="867" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0" font-weight="600">INSERT / UPDATE</text>
  <text x="540" y="883" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">inspection_answers</text>

  <!-- DB→App (success) -->
  <path d="M660 871 L900 871 L900 785 L850 785" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- A2→A3 auto-advance -->
  <line x1="220" y1="785" x2="220" y2="920" stroke="#34d399" stroke-width="1.5"/>

  <!-- A3. Auto-advance -->
  <rect x="160" y="920" width="120" height="42" rx="20" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
  <text x="220" y="946" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#34d399" font-weight="600">➡ Auto-advance</text>

  <!-- Arrow loop back to decision -->
  <line x1="160" y1="962" x2="160" y2="1080" stroke="#34d399" stroke-width="1.5"/>
  <line x1="160" y1="1080" x2="440" y2="1080" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-emerald)"/>
  <text x="280" y="1072" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">Next question</text>

  <!-- ============================================================ -->
  <!-- PATH B: Defect Found (Voice → Media → Level → Confirm) -->
  <!-- ============================================================ -->

  <!-- Arrow: Decision → Defect Path (right) -->
  <line x1="680" y1="680" x2="780" y2="680" stroke="#fb7185" stroke-width="1.5"/>
  <text x="730" y="672" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#fb7185">Yes</text>

  <!-- B1. Voice transcript -->
  <rect x="780" y="630" width="220" height="60" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="890" y="653" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#22d3ee" font-weight="600">🎤 Voice STT</text>
  <text x="890" y="673" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">id-ID continuous → textarea</text>

  <!-- B1→B2 -->
  <line x1="890" y1="690" x2="890" y2="750" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- B2. Photo/Video capture -->
  <rect x="780" y="750" width="220" height="60" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="890" y="773" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#22d3ee" font-weight="600">📸 Photo / Video</text>
  <text x="890" y="793" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">Hold locally → show thumbnails</text>

  <!-- B2→B3 -->
  <line x1="890" y1="810" x2="890" y2="870" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- B3. Select defect level -->
  <rect x="780" y="870" width="220" height="60" rx="8" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="890" y="893" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#fb7185" font-weight="600">🚩 Select Level</text>
  <text x="890" y="913" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">Rendah / Sedang / Tinggi</text>

  <!-- B3→B4 -->
  <line x1="890" y1="930" x2="890" y2="1000" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow-rose)"/>

  <!-- B4. Confirmation popup -->
  <rect x="780" y="1000" width="220" height="60" rx="8" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="890" y="1023" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#fb923c" font-weight="600">📋 Confirm Popup</text>
  <text x="890" y="1043" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">Review → Ya, Simpan</text>

  <!-- B4→B5 (cross-lane) -->
  <line x1="890" y1="1060" x2="890" y2="1100" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- B5. Save answer (flagged) -->
  <rect x="780" y="1100" width="220" height="50" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="890" y="1123" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0" font-weight="600">saveAnswer()</text>
  <text x="890" y="1139" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">flagged:true, severity</text>

  <!-- B5→DB -->
  <line x1="780" y1="1125" x2="680" y2="1125" stroke="#34d399" stroke-width="1.5"/>
  <line x1="680" y1="1125" x2="680" y2="960" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-emerald)"/>

  <!-- DB: save answer -->
  <rect x="520" y="960" width="160" height="42" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="977" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0" font-weight="600">SAVE answer</text>
  <text x="600" y="993" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">+ return answer.id</text>

  <!-- DB→App (answer.id returned) -->
  <path d="M520 981 L480 981 L480 1125 L780 1125" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- B5→B6 (got answer id) -->
  <line x1="890" y1="1150" x2="890" y2="1200" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- B6. Upload media batch -->
  <rect x="780" y="1200" width="220" height="50" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="890" y="1223" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0" font-weight="600">Upload All Media</text>
  <text x="890" y="1239" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">FM:ink] Storage + INSERT media</text>

  <!-- B6→Storage (cross-lane) -->
  <path d="M1000 1225 L1120 1225 L1120 2080 L1050 2080" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-emerald)"/>

  <!-- Storage: upload file -->
  <rect x="820" y="2070" width="240" height="42" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="940" y="2087" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0" font-weight="600">Storage.upload()</text>
  <text x="940" y="2103" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">poc-he-inspection bucket</text>

  <!-- Storage→DB (INSERT media) -->
  <line x1="820" y1="2091" x2="680" y2="2091" stroke="#fb7185" stroke-width="1.5"/>
  <line x1="680" y1="2091" x2="680" y2="2145" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-rose)"/>

  <!-- DB: INSERT media with answer_id -->
  <rect x="520" y="2145" width="320" height="42" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="680" y="2162" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#e2e8f0" font-weight="600">INSERT inspection_media</text>
  <text x="680" y="2178" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">answer_id = [returned id]</text>

  <!-- Storage→App (success) -->
  <path d="M820 2091 L780 2091 L780 1250" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-rose)"/>

  <!-- B6→B7 auto-advance -->
  <line x1="890" y1="1250" x2="890" y2="1310" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- B7. Clear + Advance -->
  <rect x="830" y="1310" width="120" height="42" rx="20" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
  <text x="890" y="1336" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#34d399" font-weight="600">➡ Auto-advance</text>

  <!-- Arrow back to decision loop -->
  <path d="M830 1331 L240 1331 L240 1080 L440 1080" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-emerald)"/>

  <!-- ============================================================ -->
  <!-- PHASE 3: Three-Dot Menu (Pause / Finish) -->
  <!-- ============================================================ -->

  <rect x="220" y="1380" width="960" height="28" rx="6" fill="#1e293b"/>
  <text x="240" y="1399" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8" font-weight="600">PHASE 3: PAUSE / FINISH — Available at any question via ⋮ menu</text>

  <!-- ⋮ Menu -->
  <rect x="220" y="1430" width="200" height="80" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
